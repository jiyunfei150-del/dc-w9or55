<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>【替换：系统名称】</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;" class="bg-gray-50 text-gray-800">
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 1】菜单配置 — 按实际页面数量填写，不要多余的占位项
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MENU = [
  {
    group: '管理',
    items: [
      { key: 'list', label: '列表页', icon: '◈', active: true },
    ]
  },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 2】表格列定义
// key: 数据字段名  label: 表头文字  render(可选): 自定义渲染
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const COLUMNS = [
  { key: 'name',   label: '名称' },
  { key: 'type',   label: '类型',   render: v => <span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded">{v}</span> },
  { key: 'status', label: '状态',   render: v => <StatusBadge status={v}/> },
  { key: 'tag',    label: '标签' },
  { key: 'updated',label: '最后更新', cls: 'text-gray-400 text-xs' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 3】筛选项
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FILTERS = [
  { key: 'type',   label: '类型', options: [['','全部'],['类型A','类型A'],['类型B','类型B']] },
  { key: 'status', label: '状态', options: [['','全部'],['active','启用'],['inactive','停用']] },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 4】Mock 数据
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const INIT_DATA = [
  { id:1, name:'示例记录 A', type:'类型A', status:'active',   tag:'标签X', updated:'2026-03-01' },
  { id:2, name:'示例记录 B', type:'类型B', status:'inactive', tag:'标签Y', updated:'2026-02-20' },
  { id:3, name:'示例记录 C', type:'类型A', status:'active',   tag:'标签X', updated:'2026-02-15' },
  { id:4, name:'示例记录 D', type:'类型B', status:'inactive', tag:'标签Z', updated:'2026-02-10' },
  { id:5, name:'示例记录 E', type:'类型A', status:'active',   tag:'标签Y', updated:'2026-02-08' },
  { id:6, name:'示例记录 F', type:'类型B', status:'inactive', tag:'标签X', updated:'2026-01-30' },
  { id:7, name:'示例记录 G', type:'类型A', status:'active',   tag:'标签Z', updated:'2026-01-25' },
  { id:8, name:'示例记录 H', type:'类型B', status:'inactive', tag:'标签Y', updated:'2026-01-20' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 5】状态徽标颜色配置
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const STATUS_MAP = {
  active:   { label:'启用', dot:'bg-green-500', cls:'bg-green-50 text-green-700 border border-green-200' },
  inactive: { label:'停用', dot:'bg-gray-400',  cls:'bg-gray-100 text-gray-500 border border-gray-200' },
  pending:  { label:'待审', dot:'bg-yellow-500',cls:'bg-yellow-50 text-yellow-700 border border-yellow-200' },
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 6】新增/编辑表单字段
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FORM_FIELDS = [
  { key:'name',   label:'名称', type:'text' },
  { key:'type',   label:'类型', type:'select', options:['类型A','类型B'] },
  { key:'status', label:'状态', type:'select', options:[{v:'active',l:'启用'},{v:'inactive',l:'停用'}] },
  { key:'tag',    label:'标签', type:'text' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【固定区】以下代码保持不变，仅修改上方替换区
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PAGE_SIZE = 6;

function StatusBadge({ status }) {
  const cfg = STATUS_MAP[status] || STATUS_MAP.pending;
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${cfg.cls}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}></span>{cfg.label}
    </span>
  );
}

function Modal({ title, onClose, children, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div className="bg-white rounded-xl shadow-2xl w-[480px] overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <span className="font-semibold text-gray-800">{title}</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>
        <div className="px-5 py-4">{children}</div>
        {footer && <div className="flex justify-end gap-2 px-5 py-3 border-t border-gray-100 bg-gray-50">{footer}</div>}
      </div>
    </div>
  );
}

function Toast({ msg, type }) {
  if (!msg) return null;
  return (
    <div className={`fixed top-4 left-1/2 -translate-x-1/2 ${type==='success'?'bg-green-600':'bg-gray-800'} text-white text-sm px-5 py-2.5 rounded-lg shadow-lg z-[9999]`}>
      {msg}
    </div>
  );
}

function Sidebar({ activeKey, onSelect }) {
  return (
    <aside className="w-52 flex-shrink-0 flex flex-col h-screen bg-[#18181b] text-zinc-400 overflow-y-auto">
      <div className="flex items-center gap-2.5 px-4 py-4 border-b border-zinc-800">
        <div className="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center text-white text-sm font-bold">◈</div>
        {/* 【替换】系统名称 */}
        <span className="text-white text-sm font-semibold">【系统名称】</span>
      </div>
      <nav className="flex-1 py-3 overflow-y-auto">
        {MENU.map(({ group, items }) => (
          <div key={group} className="mb-2">
            <div className="px-4 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-wider">{group}</div>
            {items.map(item => {
              const isActive = item.key === activeKey;
              return (
                <button key={item.key} onClick={() => onSelect(item.key)}
                  className={`w-full flex items-center gap-2.5 px-4 py-2 text-sm transition-colors ${isActive ? 'bg-zinc-700 text-white' : 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200'}`}>
                  <span className="w-5 text-center">{item.icon}</span>
                  {item.label}
                  {isActive && <span className="ml-auto w-1 h-4 bg-blue-500 rounded-full"></span>}
                </button>
              );
            })}
          </div>
        ))}
      </nav>
      <div className="px-4 py-3 border-t border-zinc-800 flex items-center gap-2.5">
        <div className="w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-semibold">张</div>
        <div>
          {/* 【替换】用户名 / 角色 */}
          <div className="text-zinc-200 text-xs font-medium">张三</div>
          <div className="text-zinc-500 text-xs">管理员</div>
        </div>
      </div>
    </aside>
  );
}

function ListPage({ showToast }) {
  const [search, setSearch]   = useState('');
  const [filters, setFilters] = useState({});
  const [page, setPage]       = useState(1);
  const [selected, setSelected] = useState([]);
  const [modal, setModal]     = useState(null);
  const [editRow, setEditRow] = useState(null);
  const [data, setData]       = useState(INIT_DATA);

  const filtered = data.filter(r => {
    if (search && !Object.values(r).join(' ').toLowerCase().includes(search.toLowerCase())) return false;
    for (const [k, v] of Object.entries(filters)) { if (v && r[k] !== v) return false; }
    return true;
  });
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const paginated = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const toggleAll = () => setSelected(s => s.length===paginated.length ? [] : paginated.map(r=>r.id));
  const toggleRow = id => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);

  const confirmSave = () => {
    if (modal==='add') { const id=Math.max(...data.map(r=>r.id))+1; setData(d=>[...d,{...editRow,id,updated:new Date().toISOString().slice(0,10)}]); }
    else setData(d=>d.map(r=>r.id===editRow.id?{...editRow}:r));
    setModal(null); showToast(modal==='add'?'✓ 已新增':'✓ 修改已保存','success');
  };
  const confirmDelete = () => { setData(d=>d.filter(r=>r.id!==editRow.id)); setModal(null); showToast('✓ 已删除','success'); };
  const resetFilters  = () => { setSearch(''); setFilters({}); setPage(1); };
  const hasFilter     = search || Object.values(filters).some(Boolean);

  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      {/* 页头 */}
      <div className="px-6 py-4 bg-white border-b border-gray-200 flex-shrink-0">
        {/* 【替换】页面标题 / 描述 */}
        <h1 className="text-base font-semibold text-gray-900">页面标题</h1>
        <p className="text-xs text-gray-400 mt-0.5">页面描述说明</p>
      </div>

      <div className="flex-1 overflow-auto px-6 py-4">

        {/* ── 筛选条 ── */}
        <div className="bg-white border border-gray-200 rounded-lg px-4 py-3 mb-3 flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-md px-3 h-8 focus-within:border-blue-400 focus-within:bg-white transition-colors">
            <span className="text-gray-400 text-sm">🔍</span>
            <input className="bg-transparent text-sm outline-none w-40 placeholder:text-gray-400" placeholder="搜索..."
              value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>
          {FILTERS.map(f => (
            <div key={f.key} className="flex items-center gap-1.5">
              <span className="text-xs text-gray-500">{f.label}</span>
              <select className="h-8 border border-gray-200 rounded-md px-2 text-sm bg-white focus:outline-none focus:border-blue-400"
                value={filters[f.key]||''} onChange={e=>{setFilters(fs=>({...fs,[f.key]:e.target.value}));setPage(1);}}>
                {f.options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          ))}
          {hasFilter && <button onClick={resetFilters} className="text-xs text-blue-500 hover:text-blue-700">重置</button>}
          <span className="ml-auto text-xs text-gray-400">共 {total} 条</span>
        </div>

        {/* ── 操作按钮组 ── */}
        <div className="flex items-center gap-2 mb-3">
          <button onClick={()=>{setEditRow({});setModal('add');}}
            className="flex items-center gap-1.5 px-3 h-8 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded-md transition-colors">
            ＋ 新增
          </button>
          <button onClick={()=>showToast('已导出')}
            className="px-3 h-8 bg-white border border-gray-200 hover:border-blue-400 hover:text-blue-500 text-sm text-gray-600 rounded-md transition-colors">
            ↓ 导出
          </button>
          {selected.length>0 && (
            <button onClick={()=>{setData(d=>d.filter(r=>!selected.includes(r.id)));setSelected([]);showToast(`✓ 已删除 ${selected.length} 条`,'success');}}
              className="px-3 h-8 bg-white border border-red-200 hover:bg-red-50 text-red-500 text-sm rounded-md transition-colors">
              🗑 删除所选 ({selected.length})
            </button>
          )}
        </div>

        {/* ── 数据表格 ── */}
        <div className="bg-white border border-gray-200 rounded-lg overflow-hidden">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 border-b border-gray-200">
                <th className="w-10 px-4 py-3">
                  <input type="checkbox" className="rounded" checked={selected.length===paginated.length&&paginated.length>0} onChange={toggleAll}/>
                </th>
                {COLUMNS.map(c=>(
                  <th key={c.key} className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">{c.label}</th>
                ))}
                <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide">操作</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {paginated.length===0 ? (
                <tr><td colSpan={COLUMNS.length+2} className="text-center py-12 text-gray-400 text-sm">暂无数据</td></tr>
              ) : paginated.map(row=>(
                <tr key={row.id} className={`hover:bg-gray-50 transition-colors ${selected.includes(row.id)?'bg-blue-50':''}`}>
                  <td className="px-4 py-3">
                    <input type="checkbox" className="rounded" checked={selected.includes(row.id)} onChange={()=>toggleRow(row.id)}/>
                  </td>
                  {COLUMNS.map(c=>(
                    <td key={c.key} className={`px-4 py-3 ${c.cls||'text-gray-700'}`}>
                      {c.render ? c.render(row[c.key]) : row[c.key]}
                    </td>
                  ))}
                  <td className="px-4 py-3">
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={()=>{setEditRow({...row});setModal('edit');}} className="px-2.5 py-1 text-xs text-blue-500 hover:bg-blue-50 rounded">编辑</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>showToast('查看详情')} className="px-2.5 py-1 text-xs text-gray-500 hover:bg-gray-100 rounded">详情</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>{setEditRow(row);setModal('delete');}} className="px-2.5 py-1 text-xs text-red-400 hover:bg-red-50 rounded">删除</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* ── 分页 ── */}
        <div className="flex items-center justify-between mt-3 px-1">
          <span className="text-xs text-gray-400">第 {Math.min((page-1)*PAGE_SIZE+1,total)}–{Math.min(page*PAGE_SIZE,total)} 条，共 {total} 条</span>
          <div className="flex items-center gap-1">
            {[{l:'«',a:()=>setPage(1),d:page===1},{l:'‹',a:()=>setPage(p=>p-1),d:page===1}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 hover:border-blue-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed">{b.l}</button>
            ))}
            {Array.from({length:totalPages},(_,i)=>i+1)
              .filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1)
              .reduce((acc,p,i,arr)=>{if(i>0&&p-arr[i-1]>1)acc.push('…');acc.push(p);return acc;},[])
              .map((p,i)=>p==='…'
                ? <span key={`e${i}`} className="w-8 h-8 flex items-center justify-center text-xs text-gray-400">…</span>
                : <button key={p} onClick={()=>setPage(p)} className={`w-8 h-8 flex items-center justify-center text-xs rounded border transition-colors ${p===page?'bg-blue-500 text-white border-blue-500':'border-gray-200 text-gray-600 hover:border-blue-400 hover:text-blue-500'}`}>{p}</button>
              )}
            {[{l:'›',a:()=>setPage(p=>p+1),d:page===totalPages},{l:'»',a:()=>setPage(totalPages),d:page===totalPages}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 hover:border-blue-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed">{b.l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 新增/编辑 Modal */}
      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'新增':'编辑'} onClose={()=>setModal(null)}
          footer={<>
            <button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
            <button onClick={confirmSave} className="px-4 h-8 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-md">确认</button>
          </>}>
          <div className="space-y-3">
            {FORM_FIELDS.map(f=>(
              <div key={f.key} className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">{f.label}</label>
                {f.type==='select' ? (
                  <select className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white"
                    value={editRow?.[f.key]||''} onChange={e=>setEditRow(r=>({...r,[f.key]:e.target.value}))}>
                    <option value="">请选择</option>
                    {f.options.map(o=>typeof o==='string'
                      ? <option key={o} value={o}>{o}</option>
                      : <option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                ) : (
                  <input type={f.type} className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400"
                    value={editRow?.[f.key]||''} onChange={e=>setEditRow(r=>({...r,[f.key]:e.target.value}))}/>
                )}
              </div>
            ))}
          </div>
        </Modal>
      )}

      {/* 删除确认 Modal */}
      {modal==='delete' && (
        <Modal title="确认删除" onClose={()=>setModal(null)}
          footer={<>
            <button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
            <button onClick={confirmDelete} className="px-4 h-8 text-sm bg-red-500 hover:bg-red-600 text-white rounded-md">确认删除</button>
          </>}>
          <p className="text-sm text-gray-600">确定要删除 <strong className="text-gray-900">「{editRow?.name}」</strong> 吗？此操作不可撤销。</p>
        </Modal>
      )}
    </main>
  );
}

function App() {
  const [activeKey, setActiveKey] = useState(MENU.flatMap(g=>g.items).find(i=>i.active)?.key || MENU[0].items[0].key);
  const [toast, setToast] = useState({ msg:'', type:'' });
  const showToast = (msg, type='default') => { setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),2200); };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar activeKey={activeKey} onSelect={setActiveKey}/>
      <ListPage showToast={showToast}/>
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
